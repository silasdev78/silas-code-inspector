name: Silas CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Silas
        run: go build -o silas ./cmd/silas

      - name: Self-scan (Tact demo)
        run: |
          ./silas --summary vulnerable.tact
          ./silas --output json vulnerable.tact > /dev/null
